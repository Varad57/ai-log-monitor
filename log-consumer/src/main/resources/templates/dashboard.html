<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>AI Log Monitor | Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .badge-error { background-color: #dc3545; }
    .badge-warn { background-color: #ffc107; color: #000; }
    .ai-box { background-color: #f0f7ff; border-left: 4px solid #0d6efd; padding: 10px; border-radius: 4px; font-size: 0.9rem; }
    .refresh-btn { transition: transform 0.2s; }
    .refresh-btn:hover { transform: rotate(15-deg); }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row mb-4 align-items-center">
    <div class="col">
      <h1 class="display-6 fw-bold text-dark">🚀 AI Log Monitor</h1>
      <p class="text-muted">Real-time Kafka Log Analysis via TinyLlama</p>
    </div>
    <div class="col-auto">
      <button onclick="window.location.reload()" class="btn btn-primary refresh-btn">
        🔄 Refresh Dashboard
      </button>
    </div>
  </div>

  <div class="row mb-4 text-center">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm p-3">
        <h3 class="text-primary" th:text="${logs.size()}">0</h3>
        <small class="text-muted uppercase">Total Logs</small>
      </div>
    </div>
  </div>

  <div class="table-container">
    <table class="table table-hover align-middle">
      <thead class="table-light">
      <tr>
        <th style="width: 10%">Service</th>
        <th style="width: 10%">Level</th>
        <th style="width: 30%">Raw Message</th>
        <th style="width: 50%">AI Root Cause & Fix</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="l : ${logs}">
        <td><strong th:text="${l.service}">SERVICE</strong></td>
        <td>
                        <span class="badge"
                              th:classappend="${l.level == 'ERROR' ? 'badge-error' : 'badge-warn'}"
                              th:text="${l.level}">LEVEL</span>
        </td>
        <td class="text-break small" th:text="${l.message}">Message content...</td>
        <td>
          <div class="ai-box">
            <span class="text-dark" th:text="${l.analysis}">AI is processing this log...</span>
          </div>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(logs)}">
        <td colspan="4" class="text-center py-5 text-muted">
          No logs found in MySQL. Send a log via Curl to see it here!
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
